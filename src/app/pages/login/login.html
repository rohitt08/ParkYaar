<div class="midnight-overlay"></div>
<div class="login-container">
    <div class="logo-section card-enter">
        <div class="logo-wrapper">
            <img src="logo.png" alt="ParkMitra Logo" class="login-logo-image">
        </div>
        <h1>ParkMitra</h1>
    </div>

    <form class="login-form card-enter" (ngSubmit)="onLogin()" #loginForm="ngForm" novalidate>
        <div class="form-meta">
            <h2 class="welcome">Find Your Perfect Spot</h2>
            <p class="sub">Sign in to manage your parking seamlessly</p>
        </div>
        
        <div class="form-group">
            <div class="input-wrapper">
                <div class="input-icon">
                    <!-- Modern User Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <input type="text" name="emailId" [(ngModel)]="loginObj.emailId" id="username" placeholder="Username or Email" autocomplete="username" required autofocus #emailModel="ngModel">
            </div>
            <div class="field-error" *ngIf="emailModel.invalid && emailModel.touched">Username is required</div>
        </div>

        <div class="form-group">
            <div class="input-wrapper password-wrapper">
                <div class="input-icon">
                    <!-- Modern Key/Lock Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="loginObj.password" id="password" placeholder="Password" autocomplete="current-password" required #passModel="ngModel">
                <button class="password-toggle" type="button" (click)="togglePassword()">
                    <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </button>
            </div>
            <div class="field-error" *ngIf="passModel.invalid && passModel.touched">Password is required</div>
        </div>

        <div class="remember-forgot">
            <label class="remember-me">
                <input type="checkbox">
                <span>Keep me signed in</span>
            </label>
            <a href="#" class="forgot-password">Recover Password</a>
        </div>
        <div *ngIf="errorMessage" class="alert">{{ errorMessage }}</div>

        <button class="login-button pill-btn" type="submit" [disabled]="!loginObj.emailId || !loginObj.password || loading" [attr.aria-busy]="loading">
            <span>Login to ParkMitra</span>
            <svg *ngIf="!loading" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
            <span class="spinner" *ngIf="loading" aria-hidden="true"></span>
        </button>
    </form>

    <div class="footer card-enter" style="animation-delay: 100ms;">
        <p>Don't have an account? <a href="#" class="signup-link">Sign up</a></p>
    </div>
</div>
